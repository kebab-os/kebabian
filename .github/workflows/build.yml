name: Build Kebabian ISO (Patched)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install live-build
      run: |
        sudo apt-get update
        sudo apt-get install -y live-build debootstrap
    
    - name: Build Kebabian ISO
      run: |
        mkdir -p kebabian-build
        cd kebabian-build
        
        # Initial config with NO security
        lb config \
          --mode debian \
          --distribution bookworm \
          --architecture amd64 \
          --archive-areas "main contrib non-free" \
          --security false
        
        # MANUALLY PATCH the config to use correct security URL
        # This directly edits the config file that live-build generates
        echo "LB_MIRROR_CHROOT_SECURITY=\"http://security.debian.org/debian-security\"" >> config/common
        echo "LB_MIRROR_BINARY_SECURITY=\"http://security.debian.org/debian-security\"" >> config/common
        
        # Add packages
        mkdir -p config/package-lists
        cat > config/package-lists/kebabian.list.chroot << 'EOF'
        neofetch
        git
        vim
        htop
        curl
        wget
        sudo
        network-manager
        xfce4
        xfce4-goodies
        lightdm
        EOF
        
        # Hook to fix sources.list (belt and suspenders)
        mkdir -p config/hooks/normal
        cat > config/hooks/normal/0000-fix-security.hook.chroot << 'EOF'
        #!/bin/bash
        # Remove any broken security entries
        sed -i '/security.debian.org/d' /etc/apt/sources.list
        # Add correct one
        echo "deb http://security.debian.org/debian-security bookworm-security main contrib non-free" >> /etc/apt/sources.list
        apt-get update
        EOF
        chmod +x config/hooks/normal/0000-fix-security.hook.chroot
        
        sudo lb build
    
    - name: Upload ISO
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: kebabian-iso
        path: kebabian-build/live-image-amd64.hybrid.iso
        if-no-files-found: warn
