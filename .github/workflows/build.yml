name: Build Kebabian ISO (Ubuntu-based)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install live-build
      run: |
        sudo apt-get update
        sudo apt-get install -y live-build debootstrap
    
    - name: Build Kebabian ISO
      run: |
        mkdir -p kebabian-build
        cd kebabian-build
        
        # Ubuntu-based - this always works on Ubuntu runners
        lb config \
          --distribution jammy \
          --architecture amd64 \
          --archive-areas "main universe multiverse restricted" \
          --debian-installer live \
          --bootappend-live "boot=live components quiet splash" \
          --iso-publisher "Kebabian" \
          --iso-volume "Kebabian Live" \
          --iso-application "Kebabian OS"
        
        # Add packages (using Xubuntu desktop for a clean experience)
        mkdir -p config/package-lists
        cat > config/package-lists/kebabian.list.chroot << 'EOF'
        neofetch
        git
        vim
        htop
        curl
        wget
        sudo
        network-manager
        xubuntu-desktop
        lightdm
        EOF
        
        sudo lb build
    
    - name: Upload ISO
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: kebabian-iso
        path: kebabian-build/live-image-amd64.hybrid.iso
        if-no-files-found: warn
